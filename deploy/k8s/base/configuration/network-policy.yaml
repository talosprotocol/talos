apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: talos-configuration-policy
  namespace: talos-system
spec:
  podSelector:
    matchLabels:
      app: talos-configuration-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: talos-dashboard
    - podSelector:
        matchLabels:
          app: talos-ai-gateway
    ports:
    - protocol: TCP
      port: 8003
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
