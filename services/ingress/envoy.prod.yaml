static_resources:
  listeners:
  - name: listener_tls
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 10443
    filter_chains:
    - transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
          common_tls_context:
            tls_certificates:
            - certificate_chain: { filename: "/etc/envoy/certs/talos.crt" }
              private_key: { filename: "/etc/envoy/certs/talos.key" }
      filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          access_log:
          - name: envoy.access_loggers.stdout
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          route_config:
            name: local_route
            virtual_hosts:
            - name: local_service
              domains: ["*"]
              routes:
              # Audit Service Route
              - match: { prefix: "/audit" }
                route:
                  cluster: cluster_audit
                  prefix_rewrite: "/"
              # Default Gateway Route
              - match: { prefix: "/" }
                route:
                  cluster: cluster_geo_us
                  retry_policy: { num_retries: 2, retry_on: "5xx,connect-failure" }

  clusters:
  - name: cluster_geo_us
    connect_timeout: 0.25s
    type: STRICT_DNS
    lb_policy: LEAST_REQUEST
    load_assignment:
      cluster_name: cluster_geo_us
      endpoints:
        - priority: 0
          lb_endpoints: [{ endpoint: { address: { socket_address: { address: talos-gateway-us, port_value: 8080 } } } }]
    health_checks:
      - timeout: 1s
        interval: 5s
        unhealthy_threshold: 2
        healthy_threshold: 2
        http_health_check: { path: "/healthz" }

  - name: cluster_audit
    connect_timeout: 0.25s
    type: STRICT_DNS
    lb_policy: LEAST_REQUEST
    load_assignment:
      cluster_name: cluster_audit
      endpoints:
        - lb_endpoints: [{ endpoint: { address: { socket_address: { address: talos-audit-service, port_value: 8001 } } } }]
    health_checks:
      - timeout: 1s
        interval: 5s
        unhealthy_threshold: 2
        healthy_threshold: 2
        http_health_check: { path: "/health" }
